<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Phantom Developer // Animated Knowledge Graph</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'JetBrains Mono', monospace; }
        body { background: #0a0a0f; margin: 0; overflow-x: hidden; }

        .glow { filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.6)); }
        .glow-text { text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }

        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        @keyframes dash { to { stroke-dashoffset: -20; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes ripple { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
        @keyframes nodeGlow { 0%, 100% { box-shadow: 0 0 5px currentColor; } 50% { box-shadow: 0 0 20px currentColor; } }

        .animate-pulse-slow { animation: pulse 3s ease-in-out infinite; }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .animate-dash { animation: dash 0.5s linear infinite; }
        .animate-node-glow { animation: nodeGlow 2s ease-in-out infinite; }

        .edge-animated { stroke-dasharray: 5, 5; animation: dash 1s linear infinite; }

        .graph-node {
            position: absolute;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: float 4s ease-in-out infinite;
        }
        .graph-node:hover { transform: scale(1.1); z-index: 100; }

        .input-field {
            background: #111;
            border: 1px solid #333;
            transition: all 0.2s;
        }
        .input-field:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            transition: all 0.2s;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4); }

        .terminal-output {
            background: linear-gradient(180deg, #0a0a0f 0%, #111 100%);
            border: 1px solid #1f2937;
        }

        .status-online { color: #10b981; text-shadow: 0 0 5px #10b981; }
        .status-offline { color: #ef4444; }

        .card {
            background: rgba(17, 17, 27, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #1f2937;
        }

        .ai-response {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(6, 78, 59, 0.2) 100%);
            border-left: 3px solid #10b981;
        }

        #graphCanvas { position: absolute; top: 0; left: 0; pointer-events: none; }

        .memory-card {
            background: linear-gradient(135deg, rgba(17, 17, 27, 0.9) 0%, rgba(10, 10, 15, 0.95) 100%);
            border: 1px solid #333;
            transition: all 0.3s;
        }
        .memory-card:hover { border-color: #10b981; transform: translateY(-2px); }
    </style>
</head>
<body class="text-emerald-400 min-h-screen">
    <!-- Header -->
    <header class="card p-4 m-4 rounded-xl">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse-slow"></div>
                <div>
                    <h1 class="text-xl font-bold text-white glow-text">PHANTOM_DEV_AI</h1>
                    <p class="text-xs text-zinc-500">Animated Knowledge Graph with Cognee AI</p>
                </div>
            </div>
            <div class="text-right text-xs">
                <div>STATUS: <span id="status" class="status-offline">OFFLINE</span></div>
                <div class="text-zinc-600">NODES: <span id="nodeCount">0</span> | EDGES: <span id="edgeCount">0</span></div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-12 gap-4 p-4">
        <!-- Left Panel: Memory Input -->
        <div class="col-span-3 space-y-4">
            <div class="card p-4 rounded-xl space-y-4">
                <h2 class="text-sm font-bold text-white uppercase tracking-wider border-b border-zinc-800 pb-2">
                    Add Memory Node
                </h2>

                <div class="space-y-2">
                    <label class="text-xs text-zinc-400 uppercase">Author</label>
                    <input id="author" type="text" value="Dave (ex-CTO)" class="w-full input-field rounded p-2 text-sm text-zinc-200 outline-none">
                </div>

                <div class="space-y-2">
                    <label class="text-xs text-zinc-400 uppercase">Commit/Message</label>
                    <input id="message" type="text" class="w-full input-field rounded p-2 text-sm text-zinc-200 outline-none" placeholder="What was done?">
                </div>

                <div class="space-y-2">
                    <label class="text-xs text-zinc-400 uppercase">Tribal Context</label>
                    <textarea id="context" rows="4" class="w-full input-field rounded p-2 text-sm text-zinc-200 outline-none resize-none" placeholder="Why? Hidden knowledge? Warnings?"></textarea>
                </div>

                <button onclick="addMemory()" class="w-full btn-primary text-zinc-950 font-bold py-2 rounded text-sm">
                    INGEST MEMORY
                </button>

                <div id="uploadStatus" class="text-xs text-center hidden"></div>
            </div>

            <!-- Quick Stats -->
            <div class="card p-4 rounded-xl">
                <h3 class="text-xs text-zinc-500 uppercase mb-3">Graph Stats</h3>
                <div id="statsPanel" class="space-y-2 text-xs">
                    <div class="flex justify-between"><span class="text-zinc-500">Memories:</span><span id="statMemories">0</span></div>
                    <div class="flex justify-between"><span class="text-zinc-500">Connections:</span><span id="statConnections">0</span></div>
                    <div class="flex justify-between"><span class="text-zinc-500">Authors:</span><span id="statAuthors">0</span></div>
                </div>
            </div>
        </div>

        <!-- Center: Animated Graph -->
        <div class="col-span-6">
            <div class="card rounded-xl overflow-hidden" style="height: 500px;">
                <div class="p-3 border-b border-zinc-800 flex justify-between items-center">
                    <span class="text-xs text-zinc-500 uppercase">Animated Knowledge Graph</span>
                    <button onclick="refreshGraph()" class="text-xs text-emerald-400 hover:text-emerald-300">REFRESH</button>
                </div>
                <div id="graphContainer" class="relative w-full h-full" style="height: 450px;">
                    <canvas id="graphCanvas"></canvas>
                    <div id="nodesContainer"></div>
                </div>
            </div>

            <!-- AI Query Panel -->
            <div class="card p-4 rounded-xl mt-4">
                <h3 class="text-xs text-zinc-500 uppercase mb-3">Query with AI</h3>
                <div class="flex gap-2">
                    <input id="queryInput" type="text" class="flex-1 input-field rounded p-2 text-sm text-zinc-200 outline-none" placeholder="Ask about tribal knowledge...">
                    <button onclick="queryAI()" class="btn-primary px-4 py-2 rounded text-sm text-zinc-950 font-bold">ASK AI</button>
                </div>
                <div id="aiResponse" class="mt-4 hidden">
                    <div class="ai-response p-3 rounded text-sm text-emerald-300"></div>
                </div>
            </div>
        </div>

        <!-- Right Panel: Terminal & Results -->
        <div class="col-span-3 space-y-4">
            <!-- Terminal Output -->
            <div class="card rounded-xl overflow-hidden" style="height: 250px;">
                <div class="p-3 border-b border-zinc-800 text-xs text-zinc-500 uppercase">Terminal Output</div>
                <div id="terminal" class="p-3 overflow-y-auto text-xs space-y-1" style="height: 200px;">
                    <div class="text-zinc-600">// System initializing...</div>
                </div>
            </div>

            <!-- Memory List -->
            <div class="card rounded-xl overflow-hidden" style="height: 250px;">
                <div class="p-3 border-b border-zinc-800 text-xs text-zinc-500 uppercase">Recent Memories</div>
                <div id="memoryList" class="p-3 overflow-y-auto space-y-2" style="height: 200px;">
                    <div class="text-zinc-600 text-xs text-center py-4">No memories yet</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8000';
        let graphData = { nodes: [], edges: [] };
        let canvas, ctx;
        let animationFrame;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initCanvas();
            checkStatus();
            refreshGraph();
            setInterval(checkStatus, 10000);
        });

        function initCanvas() {
            canvas = document.getElementById('graphCanvas');
            const container = document.getElementById('graphContainer');
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
            ctx = canvas.getContext('2d');
            animateEdges();
        }

        // Animated edge drawing
        function animateEdges() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw animated edges
            graphData.edges.forEach(edge => {
                const source = graphData.nodes.find(n => n.id === edge.source);
                const target = graphData.nodes.find(n => n.id === edge.target);
                if (source && target) {
                    drawAnimatedEdge(source, target, edge);
                }
            });

            animationFrame = requestAnimationFrame(animateEdges);
        }

        function drawAnimatedEdge(source, target, edge) {
            const time = Date.now() / 1000;
            const offset = (time * 50) % 20;

            ctx.beginPath();
            ctx.moveTo(source.x, source.y);
            ctx.lineTo(target.x, target.y);

            // Edge color based on type
            const colors = {
                'same_author': '#10b981',
                'related_topic': '#3b82f6',
                'semantic': '#8b5cf6'
            };
            ctx.strokeStyle = colors[edge.label] || '#333';
            ctx.lineWidth = 1 + (edge.strength || 0.5);
            ctx.setLineDash([5, 5]);
            ctx.lineDashOffset = -offset;
            ctx.stroke();

            // Draw moving particle
            const progress = (time * 0.5) % 1;
            const px = source.x + (target.x - source.x) * progress;
            const py = source.y + (target.y - source.y) * progress;

            ctx.beginPath();
            ctx.arc(px, py, 3, 0, Math.PI * 2);
            ctx.fillStyle = colors[edge.label] || '#10b981';
            ctx.fill();
            ctx.setLineDash([]);
        }

        async function checkStatus() {
            try {
                const res = await fetch(`${API}/health`);
                const data = await res.json();
                document.getElementById('status').textContent = 'ONLINE';
                document.getElementById('status').className = 'status-online';
                updateStats(data);
            } catch (e) {
                document.getElementById('status').textContent = 'OFFLINE';
                document.getElementById('status').className = 'status-offline';
                logTerminal('Backend connection failed', 'error');
            }
        }

        function updateStats(data) {
            document.getElementById('nodeCount').textContent = data.memories || graphData.nodes.length;
            document.getElementById('edgeCount').textContent = data.connections || graphData.edges.length;
            document.getElementById('statMemories').textContent = data.memories || graphData.nodes.length;
            document.getElementById('statConnections').textContent = data.connections || graphData.edges.length;
            document.getElementById('statAuthors').textContent = data.unique_authors || 0;
        }

        async function addMemory() {
            const author = document.getElementById('author').value.trim();
            const message = document.getElementById('message').value.trim();
            const context = document.getElementById('context').value.trim();

            if (!author || !message) {
                showUploadStatus('Author and message required', 'error');
                return;
            }

            logTerminal(`Ingesting memory from ${author}...`, 'info');
            showUploadStatus('Uploading...', 'loading');

            try {
                const res = await fetch(`${API}/ingest`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ author, message, context_stream: context })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    logTerminal(`Memory added: ${data.node_id}`, 'success');
                    logTerminal(`Connections created: ${data.connections}`, 'info');
                    showUploadStatus('Memory ingested!', 'success');

                    // Clear inputs
                    document.getElementById('message').value = '';
                    document.getElementById('context').value = '';

                    // Refresh graph
                    refreshGraph();
                } else {
                    throw new Error(data.detail || 'Upload failed');
                }
            } catch (e) {
                logTerminal(`Error: ${e.message}`, 'error');
                showUploadStatus('Upload failed', 'error');
            }
        }

        async function refreshGraph() {
            try {
                const res = await fetch(`${API}/graph`);
                const data = await res.json();
                graphData = data;
                renderNodes();
                updateStats({ memories: data.nodes.length, connections: data.edges.length });
                updateMemoryList(data.nodes);
            } catch (e) {
                logTerminal('Failed to load graph', 'error');
            }
        }

        function renderNodes() {
            const container = document.getElementById('nodesContainer');
            container.innerHTML = '';

            graphData.nodes.forEach((node, i) => {
                const colors = ['#10b981', '#3b82f6', '#8b5cf6', '#f59e0b', '#ef4444', '#ec4899'];
                const color = colors[i % colors.length];

                const div = document.createElement('div');
                div.className = 'graph-node';
                div.style.left = `${node.x}px`;
                div.style.top = `${node.y}px`;
                div.style.background = `${color}20`;
                div.style.borderLeft = `3px solid ${color}`;
                div.style.color = color;
                div.style.animationDelay = `${i * 0.1}s`;
                div.innerHTML = `
                    <div class="text-[10px] opacity-70">${node.author}</div>
                    <div class="text-xs">${node.label}</div>
                `;

                div.onclick = () => showNodeDetails(node);
                container.appendChild(div);
            });
        }

        function showNodeDetails(node) {
            logTerminal(`NODE: ${node.id}`, 'info');
            logTerminal(`  Author: ${node.author}`, 'dim');
            logTerminal(`  Message: ${node.fullLabel}`, 'dim');
            logTerminal(`  Connections: ${node.connections?.length || 0}`, 'dim');
        }

        function updateMemoryList(nodes) {
            const list = document.getElementById('memoryList');
            if (!nodes.length) {
                list.innerHTML = '<div class="text-zinc-600 text-xs text-center py-4">No memories yet</div>';
                return;
            }

            list.innerHTML = nodes.slice(0, 10).map(n => `
                <div class="memory-card p-2 rounded text-xs cursor-pointer" onclick="showNodeDetails(${JSON.stringify(n).replace(/"/g, '&quot;')})">
                    <div class="text-zinc-500">${n.id}</div>
                    <div class="text-emerald-400 truncate">${n.label}</div>
                    <div class="text-zinc-600 text-[10px]">${n.author}</div>
                </div>
            `).join('');
        }

        async function queryAI() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) return;

            logTerminal(`Query: "${query}"`, 'info');
            const responseDiv = document.getElementById('aiResponse');
            responseDiv.classList.remove('hidden');
            responseDiv.querySelector('div').innerHTML = '<span class="animate-pulse">Processing...</span>';

            try {
                const res = await fetch(`${API}/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: query, use_ai: true })
                });
                const data = await res.json();

                if (data.ai_answer) {
                    responseDiv.querySelector('div').innerHTML = `
                        <div class="font-bold mb-2">AI Response:</div>
                        <div>${data.ai_answer}</div>
                        <div class="mt-2 text-xs text-zinc-500">Found ${data.total_found} related memories</div>
                    `;
                    logTerminal('AI response received', 'success');
                } else {
                    responseDiv.querySelector('div').innerHTML = `No relevant memories found for "${query}"`;
                    logTerminal('No results found', 'dim');
                }
            } catch (e) {
                responseDiv.querySelector('div').innerHTML = 'Query failed. Backend may be offline.';
                logTerminal('Query error', 'error');
            }
        }

        function logTerminal(message, type = 'dim') {
            const terminal = document.getElementById('terminal');
            const colors = {
                success: 'text-emerald-400',
                error: 'text-red-400',
                info: 'text-blue-400',
                dim: 'text-zinc-500'
            };

            const line = document.createElement('div');
            line.className = colors[type];
            line.textContent = `> ${message}`;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function showUploadStatus(message, type) {
            const status = document.getElementById('uploadStatus');
            status.classList.remove('hidden', 'text-emerald-400', 'text-red-400');
            status.classList.add(type === 'success' ? 'text-emerald-400' : 'text-red-400');
            status.textContent = message;
            setTimeout(() => status.classList.add('hidden'), 3000);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            const container = document.getElementById('graphContainer');
            if (canvas && container) {
                canvas.width = container.offsetWidth;
                canvas.height = container.offsetHeight;
            }
        });

        // Enter key for query
        document.getElementById('queryInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') queryAI();
        });
    </script>
</body>
</html>
